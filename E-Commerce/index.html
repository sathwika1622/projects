<html>
<head>
    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛍️ Product Store</h1>

<div class="products">

<div class="product">
    <h3>Laptop</h3>
    <p>Price: ₹50000</p>
    <button onclick="addToCart(1,'Laptop',50000)">Add to Cart</button>
</div>

<div class="product">
    <h3>Smartphone</h3>
    <p>Price: ₹20000</p>
    <button onclick="addToCart(2,'Smartphone',20000)">Add to Cart</button>
</div>

<div class="product">
    <h3>Headphones</h3>
    <p>Price: ₹3000</p>
    <button onclick="addToCart(3,'Headphones',3000)">Add to Cart</button>
</div>


</div>

<a href="cart.html">
    <button class="cart-btn">Go to Cart 🛒</button>
</a>

<script src="script.js"></script>

</body>
</html>
