<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SecureApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13151c;
      --border: rgba(255,255,255,0.07);
      --accent: #6effc7;
      --accent-dim: rgba(110,255,199,0.12);
      --accent-glow: rgba(110,255,199,0.35);
      --text: #eef0f6;
      --muted: #6b7090;
      --error: #ff6b6b;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background mesh ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .bg-mesh::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(110,255,199,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-mesh::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      bottom: -150px; right: -100px;
      background: radial-gradient(circle, rgba(100,140,255,0.07) 0%, transparent 70%);
      border-radius: 50%;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / Header ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: var(--accent-dim);
      border: 1.5px solid rgba(110,255,199,0.3);
      border-radius: 14px;
      display: grid; place-items: center;
      margin-bottom: 16px;
      position: relative;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50%      { box-shadow: 0 0 0 10px transparent; }
    }
    .logo-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-size: 0.85rem; color: var(--muted); margin-top: 4px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--muted); fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: #3f4260; }
    input:focus {
      border-color: rgba(110,255,199,0.45);
      background: rgba(110,255,199,0.04);
      box-shadow: 0 0 0 4px rgba(110,255,199,0.08);
    }
    input:focus + svg, .input-wrap:focus-within svg { stroke: var(--accent); }

    /* toggle password eye */
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--muted); transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }
    .eye-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    #password { padding-right: 40px; }

    /* ── Error ── */
    .error-msg {
      font-size: 0.8rem; color: var(--error);
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.35s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    /* ── Button ── */
    .btn-login {
      width: 100%; padding: 13px;
      background: var(--accent);
      color: #0b0c10;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(110,255,199,0.35);
    }
    .btn-login:active { transform: translateY(0); box-shadow: none; }

    .btn-login .btn-text { transition: opacity 0.2s; }
    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0b0c10;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .btn-login.loading .btn-text { opacity: 0; }
    .btn-login.loading .spinner { display: block; }

    /* ── Footer ── */
    .card-footer {
      text-align: center; margin-top: 24px;
      font-size: 0.85rem; color: var(--muted);
    }
    .card-footer a {
      color: var(--accent); text-decoration: none; font-weight: 500;
      transition: opacity 0.15s;
    }
    .card-footer a:hover { opacity: 0.75; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 4px; color: var(--muted); font-size: 0.75rem;
    }
    .divider::before,.divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="card" role="main">

  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- Shield icon -->
      <svg viewBox="0 0 24 24"><path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6L12 2z"/></svg>
    </div>
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to continue to SecureApp</p>
  </div>

  <div class="error-msg" id="errorMsg" role="alert">
    ⚠️ Invalid username or password. Please try again.
  </div>

  <div class="form-group">
    <label for="username">Username</label>
    <div class="input-wrap">
      <input id="username" type="text" placeholder="Enter your username" autocomplete="username"/>
      <!-- User icon (rendered after input so z-index works) -->
      <svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
      <svg viewBox="0 0 24 24" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <button class="eye-btn" type="button" id="togglePwd" aria-label="Toggle password visibility">
        <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div style="text-align:right; margin: -6px 0 20px;">
    <a href="#" style="font-size:0.8rem; color:var(--muted); text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">
    <span class="btn-text">Sign In</span>
    <span class="spinner"></span>
  </button>

  <div class="divider">or</div>

  <p class="card-footer">
    Don't have an account? <a href="register.html">Create one</a>
  </p>

</div>

<script>
  // Toggle password visibility
  const togglePwd = document.getElementById('togglePwd');
  const pwdInput  = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');

  const eyeOpen   = `<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  togglePwd.addEventListener('click', () => {
    const isHidden = pwdInput.type === 'password';
    pwdInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠️ ' + msg;
    el.classList.remove('show');
    void el.offsetWidth; // reflow to re-trigger animation
    el.classList.add('show');
  }

  function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      showError('Please fill in all fields.');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    document.getElementById('errorMsg').classList.remove('show');

    fetch(`/api/users/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
      method: 'POST'
    })
    .then(res => {
      if (!res.ok) throw new Error('Server error');
      return res.text();
    })
    .then(role => {
      if (role === 'ADMIN') {
        window.location.href = 'admin.html';
      } else if (role === 'USER') {
        window.location.href = 'index.html';
      } else {
        showError('Invalid username or password.');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    })
    .catch(() => {
      showError('Unable to connect. Please try again.');
      btn.classList.remove('loading');
      btn.disabled = false;
    });
  }
</script>

</body>
</html>
